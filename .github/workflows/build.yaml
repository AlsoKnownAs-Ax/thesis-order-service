name: Build Java Order Service with gRPC

on:
  push: 
    branches: 
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Order Service Repo
        uses: actions/checkout@v2

      - name: Checkout gRPC Contracts
        uses: actions/checkout@v2
        with:
          repository: AlsoKnownAs-Ax/thesis-proto-contracts
          path: grpc-contracts

      - name: Set up Java SDK 21
        uses: actions/setup-java@v2
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install deps
        run: mvn install -DskipTests

      - name: Generate gRPC Java stubs from Protobufs
        run: mvn clean compile

      - name: Build Service
        run: mvn package -DskipTests