spring.application.name=orderService

server.port=8083

spring.datasource.url=jdbc:sqlite:orderdb.db
spring.datasource.driver-class-name=org.sqlite.JDBC

spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# gRPC

grpc.server.port=9093

clients.user-service.host=localhost
clients.user-service.port=50051

clients.product-service.host=localhost
clients.product-service.port=50052